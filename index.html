<div id="countdown"></div>

<script>
const targetDate = new Date("2026-06-19T14:00:00").getTime();

function formatNumber(num) {
  return String(num).padStart(2, "0");
}

function createDigits(num) {
  return formatNumber(num)
    .split("")
    .map(d => `<div class="digit">${d}</div>`)
    .join("");
}

setInterval(() => {
  const now = new Date().getTime();
  const diff = targetDate - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerHTML = `
    <div class="time-block">
      <div class="numbers">${createDigits(days)}</div>
      <div class="label">Days</div>
    </div>
    <div class="time-block">
      <div class="numbers">${createDigits(hours)}</div>
      <div class="label">Hours</div>
    </div>
    <div class="time-block">
      <div class="numbers">${createDigits(minutes)}</div>
      <div class="label">Minutes</div>
    </div>
    <div class="time-block">
      <div class="numbers">${createDigits(seconds)}</div>
      <div class="label">Seconds</div>
    </div>
  `;
}, 1000);
</script>
